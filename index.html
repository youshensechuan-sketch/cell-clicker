<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cell Evolution Clicker</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; cursor: pointer; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px;
            max-width: 280px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #ui h1 { margin: 0 0 5px 0; font-size: 24px; }
        #ui h2 { margin: 0 0 10px 0; font-size: 18px; color: #ffeb3b; }
        #ui p { margin: 0 0 5px 0; font-size: 12px; color: #aaa; line-height: 1.3; }
        
        /* ★ ショップ用のスタイル */
        .shop { margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .shop h3 { margin: 0 0 10px 0; font-size: 14px; color: #ffeb3b; letter-spacing: 1px; }
        .shop-item { margin-bottom: 12px; font-size: 11px; color: #ddd; }
        .shop-btn {
            margin-top: 4px; background: #333; color: #fff; border: 1px solid #666;
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; width: 100%;
            transition: background 0.2s;
        }
        .shop-btn:hover { background: #444; }
        .shop-btn:disabled { background: #1a1a1a; color: #444; border-color: #222; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Cells: <span id="count">0</span></h1>
        <h2>Stocked Jars: <span id="jar-count">0</span></h2>
        <p>細胞をクリックして分裂・進化させよう</p>
        <p>1000個に達すると瓶詰めされます</p>
        
        <div class="shop">
            <h3>🧬 SHOP 🧬</h3>
            <div class="shop-item">
                <span>栄養剤 (Lv.<span id="nutrient-level">0</span>): 分裂数アップ</span>
                <button id="buy-nutrient" class="shop-btn">購入 (瓶:<span id="nutrient-cost">1</span>個)</button>
            </div>
            <div class="shop-item">
                <span>培養液 (Lv.<span id="culture-level">0</span>): 毎秒自動生成</span>
                <button id="buy-culture" class="shop-btn">購入 (瓶:<span id="culture-cost">1</span>個)</button>
            </div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const countDisplay = document.getElementById('count');
        const jarDisplay = document.getElementById('jar-count');

        // ★ ショップ用UIの取得
        const nutrientLvlDisplay = document.getElementById('nutrient-level');
        const nutrientCostDisplay = document.getElementById('nutrient-cost');
        const cultureLvlDisplay = document.getElementById('culture-level');
        const cultureCostDisplay = document.getElementById('culture-cost');
        const buyNutrientBtn = document.getElementById('buy-nutrient');
        const buyCultureBtn = document.getElementById('buy-culture');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let cells = [];
        const MAX_CELLS = 1000; 
        let stockedJars = 0;       
        let isStocking = false;     

        // ★ ショップ用の状態変数
        let nutrientLevel = 0;
        let cultureFluidLevel = 0;
        let nutrientCost = 1;
        let cultureFluidCost = 1;
        let lastAutoGrowTime = performance.now(); // 自動生成タイマー用

        const jarPos = {
            x: canvas.width - 100,
            y: canvas.height - 120,
            width: 80,
            height: 100
        };

        function getHslString(h, s, l) {
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        class Cell {
            constructor(x, y, radius, h, s, l, vx, vy) {
                this.x = x;
                this.y = y;
                this.baseRadius = radius; 
                this.radius = radius * 0.4; 
                this.h = h; 
                this.s = s; 
                this.l = l; 
                this.color = getHslString(this.h, this.s, this.l);
                this.vx = vx;
                this.vy = vy;
                this.friction = 0.96;
                this.isGrowing = true; 
                this.growthRate = 0.5; 
                this.markedForRemoval = false;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                if (this.isGrowing) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 + Math.random() * 0.1})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                if (!isStocking) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = getHslString(this.h, this.s, this.l - 20); 
                    ctx.fill();
                    ctx.closePath();
                }
            }

            update() {
                if (isStocking) {
                    const targetX = jarPos.x + jarPos.width / 2;
                    const targetY = jarPos.y;
                    const dx = targetX - this.x;
                    const dy = targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 5) {
                        const speed = (MAX_CELLS - cells.length) * 0.01 + 2; 
                        const angle = Math.atan2(dy, dx);
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.x += this.vx;
                        this.y += this.vy;
                    } else {
                        this.markedForRemoval = true;
                    }
                    return; 
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.friction;
                this.vy *= this.friction;

                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; }
                if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -1; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -1; }

                if (this.isGrowing) {
                    this.radius += this.growthRate;
                    if (this.radius >= this.baseRadius) {
                        this.radius = this.baseRadius;
                        this.isGrowing = false; 
                    }
                }
            }

            // ★ 栄養剤のレベルに応じて分裂数を増やす処理
            split() {
                const angleStep = Math.random() * Math.PI * 2;
                const count = 2 + nutrientLevel; // レベル0なら2個、レベル1なら3個...
                const speed = 6;
                const newCells = [];

                for (let i = 0; i < count; i++) {
                    // 放射状にきれいに散らばるように角度を計算
                    const angle = angleStep + (i * (Math.PI * 2) / count);
                    const offset = this.radius * 0.4;
                    const nextH = (this.h + (Math.random() - 0.5) * 30) % 360;

                    newCells.push(new Cell(
                        this.x + Math.cos(angle) * offset,
                        this.y + Math.sin(angle) * offset,
                        this.baseRadius, nextH, this.s, this.l,
                        Math.cos(angle) * speed, Math.sin(angle) * speed
                    ));
                }
                return newCells;
            }
        }

        function drawJar() {
            const { x, y, width, height } = jarPos;
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#fff';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + height - 10);
            ctx.quadraticCurveTo(x, y + height, x + 10, y + height);
            ctx.lineTo(x + width - 10, y + height);
            ctx.quadraticCurveTo(x + width, y + height, x + width, y + height - 10);
            ctx.lineTo(x + width, y);
            ctx.closePath();
            ctx.stroke();
            ctx.fill();

            ctx.beginPath();
            ctx.rect(x + width * 0.1, y - 10, width * 0.8, 15);
            ctx.fillStyle = '#aaa';
            ctx.fill();
            ctx.stroke();

            if (isStocking && cells.length > 0) {
                const fillPercent = 1 - (cells.length / MAX_CELLS);
                ctx.fillStyle = `hsla(333, 100%, 75%, ${0.3 + fillPercent * 0.5})`; 
                ctx.beginPath();
                ctx.rect(x + 4, y + height - 4 - (height * fillPercent), width - 8, height * fillPercent);
                ctx.fill();
            }
        }

        // ★ ショップUIの更新と購入制限の管理
        function updateShopUI() {
            nutrientCost = nutrientLevel + 1;
            cultureFluidCost = cultureFluidLevel + 1;

            nutrientLvlDisplay.innerText = nutrientLevel;
            nutrientCostDisplay.innerText = nutrientCost;
            cultureLvlDisplay.innerText = cultureFluidLevel;
            cultureCostDisplay.innerText = cultureFluidCost;

            // 瓶が足りない時や、瓶詰め演出中はボタンを無効化
            buyNutrientBtn.disabled = (stockedJars < nutrientCost || isStocking);
            buyCultureBtn.disabled = (stockedJars < cultureFluidCost || isStocking);
        }

        function resetGame() {
            isStocking = false;
            cells = [];
            stockedJars++; 
            jarDisplay.innerText = stockedJars; 
            countDisplay.innerText = 0;
            localStorage.setItem('cell_jars', stockedJars);
            updateShopUI(); // 瓶が増えたのでショップを更新
            
            setTimeout(() => {
                cells.push(new Cell(canvas.width / 2, canvas.height / 2, 28, 333, 100, 75, 0, 0));
                countDisplay.innerText = 1;
            }, 1000);
        }

        function animate() {
            ctx.fillStyle = isStocking ? 'rgba(10, 10, 10, 0.3)' : 'rgba(17, 17, 17, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ★ 培養液による自動生成ロジック (1秒ごと)
            const now = performance.now();
            if (!isStocking && cultureFluidLevel > 0 && now - lastAutoGrowTime >= 1000) {
                // 1秒間にレベルの数だけ細胞を追加（上限を超えないように制御）
                const spawnCount = Math.min(cultureFluidLevel, MAX_CELLS - cells.length);
                for (let i = 0; i < spawnCount; i++) {
                    let spawnX = canvas.width / 2;
                    let spawnY = canvas.height / 2;
                    let baseH = 333;

                    // 既存の細胞があれば、その近くからポコッと生やす
                    if (cells.length > 0) {
                        const randomCell = cells[Math.floor(Math.random() * cells.length)];
                        spawnX = randomCell.x + (Math.random() - 0.5) * 30;
                        spawnY = randomCell.y + (Math.random() - 0.5) * 30;
                        baseH = randomCell.h;
                    }

                    const nextH = (baseH + (Math.random() - 0.5) * 30) % 360;
                    const speed = 2;
                    const angle = Math.random() * Math.PI * 2;

                    cells.push(new Cell(
                        spawnX, spawnY, 28, nextH, 100, 75,
                        Math.cos(angle) * speed, Math.sin(angle) * speed
                    ));
                }
                lastAutoGrowTime = now;
                countDisplay.innerText = cells.length;
            } else if (isStocking) {
                lastAutoGrowTime = now; // 瓶詰め中は自動生成タイマーを一時停止
            }

            if (!isStocking && cells.length >= MAX_CELLS) {
                isStocking = true;
                updateShopUI(); // 瓶詰め開始時にショップを無効化
            }

            drawJar();

            if (!isStocking) {
                for (let i = 0; i < cells.length; i++) {
                    for (let j = i + 1; j < cells.length; j++) {
                        const dx = cells[j].x - cells[i].x;
                        const dy = cells[j].y - cells[i].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const minDistance = cells[i].radius + cells[j].radius;

                        if (distance < minDistance) {
                            const angle = Math.atan2(dy, dx);
                            const force = (minDistance - distance) * 0.08; 
                            cells[i].vx -= Math.cos(angle) * force;
                            cells[i].vy -= Math.sin(angle) * force;
                            cells[j].vx += Math.cos(angle) * force;
                            cells[j].vy += Math.sin(angle) * force;
                        }
                    }
                }
            }

            cells.forEach(cell => {
                cell.update();
                cell.draw();
            });

            if (isStocking) {
                cells = cells.filter(cell => !cell.markedForRemoval);
                countDisplay.innerText = cells.length; 

                if (cells.length === 0 && isStocking) {
                    resetGame();
                }
            }

            requestAnimationFrame(animate);
        }

        // ★ UI（ショップなど）をクリックしたときに後ろの画面が反応するのを防ぐ
        document.getElementById('ui').addEventListener('mousedown', (e) => {
            e.stopPropagation();
        });

        // ★ 栄養剤の購入処理
        document.getElementById('buy-nutrient').addEventListener('click', () => {
            if (stockedJars >= nutrientCost && !isStocking) {
                stockedJars -= nutrientCost;
                nutrientLevel++;
                localStorage.setItem('cell_jars', stockedJars);
                localStorage.setItem('cell_nutrient_lvl', nutrientLevel);
                jarDisplay.innerText = stockedJars;
                updateShopUI();
            }
        });

        // ★ 培養液の購入処理
        document.getElementById('buy-culture').addEventListener('click', () => {
            if (stockedJars >= cultureFluidCost && !isStocking) {
                stockedJars -= cultureFluidCost;
                cultureFluidLevel++;
                localStorage.setItem('cell_jars', stockedJars);
                localStorage.setItem('cell_culture_lvl', cultureFluidLevel);
                jarDisplay.innerText = stockedJars;
                updateShopUI();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (isStocking) return;
            let splitOccurred = false;
            for (let i = cells.length - 1; i >= 0; i--) {
                if (cells[i].isGrowing) continue;

                const dx = e.clientX - cells[i].x;
                const dy = e.clientY - cells[i].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < cells[i].radius && cells.length < MAX_CELLS) {
                    const newCells = cells[i].split();
                    cells.splice(i, 1, ...newCells);
                    splitOccurred = true;
                    break;
                }
            }
            countDisplay.innerText = cells.length;
        });

        function initGame() {
            // セーブデータの復元（ショップレベルも含む）
            const savedJars = localStorage.getItem('cell_jars');
            if (savedJars) stockedJars = parseInt(savedJars);
            jarDisplay.innerText = stockedJars;

            const savedNutrient = localStorage.getItem('cell_nutrient_lvl');
            if (savedNutrient) nutrientLevel = parseInt(savedNutrient);

            const savedCulture = localStorage.getItem('cell_culture_lvl');
            if (savedCulture) cultureFluidLevel = parseInt(savedCulture);

            updateShopUI();

            cells = []; 
            cells.push(new Cell(canvas.width / 2, canvas.height / 2, 28, 333, 100, 75, 0, 0));
            countDisplay.innerText = cells.length;
        }

        initGame();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            jarPos.x = canvas.width - 100;
            jarPos.y = canvas.height - 120;
        });
    </script>
</body>
</html>
